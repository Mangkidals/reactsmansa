<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<title>New project</title>
	
	<!-- Standardised web app manifest -->
	<link rel="manifest" href="appmanifest.json" />
	
	<!-- Allow fullscreen mode on iOS devices. (These are Apple specific meta tags.) -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
	<meta name="HandheldFriendly" content="true" />
	
	<!-- Chrome for Android web app tags -->
	<meta name="mobile-web-app-capable" content="yes" />
	<link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

    <!-- All margins and padding must be zero for the canvas to fill the screen. -->
	<style type="text/css">
		* {
			padding: 0;
			margin: 0;
		}
		html, body {
			background: #000;
			color: #fff;
			overflow: hidden;
			touch-action: none;
			-ms-touch-action: none;
		}
		canvas {
			touch-action-delay: none;
			touch-action: none;
			-ms-touch-action: none;
		}
    </style>
	<style>
		/* Tombol toggle Fullscreen */
		#fs-toggle-btn {
			position: fixed;
			bottom: 12px;
			right: 12px;
			z-index: 99999;
			width: 40px;
			height: 40px;
			border: none;
			border-radius: 10px;
			background: rgba(255, 0, 0, 0.6);
			backdrop-filter: blur(6px);
			-webkit-backdrop-filter: blur(6px);
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			transition: background 0.2s, transform 0.15s, opacity 0.3s;
			opacity: 0.8;
			box-shadow: 0 2px 8px rgba(0,0,0,0.18);
		}
		#fs-toggle-btn:hover {
			background: rgba(255, 0, 0, 0.9);
			opacity: 1;
			transform: scale(1.1);
		}
		#fs-toggle-btn:active {
			transform: scale(0.95);
		}
		#fs-toggle-btn svg {
			width: 20px;
			height: 20px;
			fill: #fff;
			filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
		}
		/* Tampilkan icon enter fullscreen atau exit fullscreen secara bergantian */
		#fs-icon-enter { display: block; }
		#fs-icon-exit  { display: none; }
		:fullscreen #fs-icon-enter,
		:-webkit-full-screen #fs-icon-enter,
		:-moz-full-screen #fs-icon-enter { display: none; }
		:fullscreen #fs-icon-exit,
		:-webkit-full-screen #fs-icon-exit,
		:-moz-full-screen #fs-icon-exit { display: block; }
	</style>

</head> 
 
<body> 
	<div id="fb-root"></div>
	
	<script>
	// Issue a warning if trying to preview an exported project on disk.
	(function(){
		// Check for running exported on file protocol
		if (window.location.protocol.substr(0, 4) === "file")
		{
			alert("Exported games won't work until you upload them. (When running on the file:/// protocol, browsers block many features from working for security reasons.)");
		}
	})();
	</script>
	
	<!-- The canvas must be inside a div called c2canvasdiv -->
	<div id="c2canvasdiv">
	
		<!-- The canvas the project will render to.  If you change its ID, don't forget to change the
		ID the runtime looks for in the jQuery events above (ready() and cr_sizeCanvas()). -->
		<canvas id="c2canvas" width="854" height="480">
			<!-- This text is displayed if the visitor's browser does not support HTML5.
			You can change it, but it is a good idea to link to a description of a browser
			and provide some links to download some popular HTML5-compatible browsers. -->
			<h1>Your browser does not appear to support HTML5.  Try upgrading your browser to the latest version.  <a href="http://www.whatbrowser.org">What is a browser?</a>
			<br/><br/><a href="http://www.microsoft.com/windows/internet-explorer/default.aspx">Microsoft Internet Explorer</a><br/>
			<a href="http://www.mozilla.com/firefox/">Mozilla Firefox</a><br/>
			<a href="http://www.google.com/chrome/">Google Chrome</a><br/>
			<a href="http://www.apple.com/safari/download/">Apple Safari</a></h1>
		</canvas>
		
	</div>
	
	<!-- Tombol Fullscreen Toggle (di dalam iframe) -->
	<button id="fs-toggle-btn" title="Toggle Fullscreen">
		<!-- Icon masuk fullscreen (expand) -->
		<svg id="fs-icon-enter" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
			<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
		</svg>
		<!-- Icon keluar fullscreen (compress) -->
		<svg id="fs-icon-exit" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
			<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
		</svg>
	</button>
	
	<!-- Pages load faster with scripts at the bottom -->
	
	<!-- Construct 2 exported games require jQuery. -->
	<script src="jquery-3.4.1.min.js"></script>


	
    <!-- The runtime script.  You can rename it, but don't forget to rename the reference here as well.
    This file will have been minified and obfuscated if you enabled "Minify script" during export. -->
	<script src="c2runtime.js"></script>

    <script>
		// Start the Construct 2 project running on window load.
		jQuery(document).ready(function ()
		{			
			// Create new runtime using the c2canvas
			cr_createRuntime("c2canvas");
		});
		
		// Pause and resume on page becoming visible/invisible
		function onVisibilityChanged() {
			if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
				cr_setSuspended(true);
			else
				cr_setSuspended(false);
		};
		
		document.addEventListener("visibilitychange", onVisibilityChanged, false);
		document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
		
		function OnRegisterSWError(e)
		{
			console.warn("Failed to register service worker: ", e);
		};
		
		// Runtime calls this global method when ready to start caching (i.e. after startup).
		// This registers the service worker which caches resources for offline support.
		window.C2_RegisterSW = function C2_RegisterSW()
		{
			if (!navigator.serviceWorker)
				return;		// no SW support, ignore call
			
			try {
				navigator.serviceWorker.register("sw.js", { scope: "./" })
				.then(function (reg)
				{
					console.log("Registered service worker on " + reg.scope);
				})
				.catch(OnRegisterSWError);
			}
			catch (e)
			{
				OnRegisterSWError(e);
			}
		};
    </script>

	<script>
	// Listen for keyboard and click events forwarded from the parent React app
	// This enables on-screen touch controls (D-pad + click) and keyboard forwarding
	(function() {
		window.addEventListener('message', function(e) {
			if (!e.data || !e.data.type) return;

			var canvas = document.getElementById('c2canvas');
			if (!canvas) return;

			if (e.data.type === 'KEYDOWN' || e.data.type === 'KEYUP') {
				var eventType = e.data.type === 'KEYDOWN' ? 'keydown' : 'keyup';
				var evt = new KeyboardEvent(eventType, {
					key: e.data.key,
					keyCode: e.data.keyCode,
					which: e.data.which,
					code: e.data.key,
					bubbles: true,
					cancelable: true
				});
				canvas.dispatchEvent(evt);
				document.dispatchEvent(evt);
			}

			if (e.data.type === 'SIMULATE_CLICK') {
				var rect = canvas.getBoundingClientRect();
				var centerX = rect.width / 2;
				var centerY = rect.height / 2;

				['mousedown', 'mouseup', 'click'].forEach(function(type) {
					var evt = new MouseEvent(type, {
						clientX: rect.left + centerX,
						clientY: rect.top + centerY,
						bubbles: true,
						cancelable: true,
						view: window
					});
					canvas.dispatchEvent(evt);
				});
			}
		});
	})();
	</script>

	<script>
	// Fullscreen toggle logic — bekerja standalone maupun di dalam iframe React
	(function() {
		var btn = document.getElementById('fs-toggle-btn');
		var iconEnter = document.getElementById('fs-icon-enter');
		var iconExit = document.getElementById('fs-icon-exit');
		var isInsideIframe = (window.self !== window.top);

		function updateIcons(isFS) {
			if (iconEnter) iconEnter.style.display = isFS ? 'none' : 'block';
			if (iconExit)  iconExit.style.display  = isFS ? 'block' : 'none';
		}

		// Dengarkan pesan dari React parent (FULLSCREEN_STATE)
		window.addEventListener('message', function(e) {
			if (e.data && e.data.type === 'FULLSCREEN_STATE') {
				updateIcons(e.data.isFullscreen);
			}
		});

		// Update icon ketika fullscreen berubah di dokumen ini (mode standalone)
		function onFSChange() {
			var isFS = !!(document.fullscreenElement ||
				document.webkitFullscreenElement ||
				document.mozFullScreenElement ||
				document.msFullscreenElement);
			if (!isInsideIframe) updateIcons(isFS);
		}
		document.addEventListener('fullscreenchange', onFSChange);
		document.addEventListener('webkitfullscreenchange', onFSChange);
		document.addEventListener('mozfullscreenchange', onFSChange);
		document.addEventListener('MSFullscreenChange', onFSChange);

		if (btn) {
			btn.addEventListener('click', function() {
				if (isInsideIframe) {
					// Kirim permintaan fullscreen ke parent React
					window.parent.postMessage({ type: 'TOGGLE_FULLSCREEN' }, '*');
				} else {
					// Mode standalone: fullscreen langsung di dokumen ini
					var elem = document.documentElement;
					var isFS = !!(document.fullscreenElement ||
						document.webkitFullscreenElement ||
						document.mozFullScreenElement ||
						document.msFullscreenElement);
					if (isFS) {
						if (document.exitFullscreen) document.exitFullscreen();
						else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
						else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
						else if (document.msExitFullscreen) document.msExitFullscreen();
					} else {
						if (elem.requestFullscreen) elem.requestFullscreen();
						else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
						else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
						else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
					}
				}
			});
		}
	})();
	</script>
</body> 
</html>
